[build]
  publish = "."

# Clean URL rewrites (serve .html without extension)
[[redirects]]
  from = "/blog"
  to = "/blog.html"
  status = 200

[[redirects]]
  from = "/price"
  to = "/price.html"
  status = 200

# 404 page for all non-existent URLs
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
